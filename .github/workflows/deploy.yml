name: Deploy QT터링 to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      # config.js 를 GitHub Secrets에서 생성 (절대 소스코드에 키 노출 금지)
      - name: 🔑 Create config.js from secrets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          echo "// Auto-generated by GitHub Actions. Do NOT commit this file." > js/config.js
          echo "window.SUPABASE_URL = '${SUPABASE_URL}';" >> js/config.js
          echo "window.SUPABASE_ANON_KEY = '${SUPABASE_ANON_KEY}';" >> js/config.js

      - name: 🚀 Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          # 배포 시 불필요한 파일 제외
          exclude_assets: '.github,supabase,*.md,*.example.*,.env*'
